[transpilation]
# Emit Rust code that compiles
emit_modules = true
emit_extern_crates = true
use_std = true

# Paths
source_files = ["sqlite-shell-src/shell.c"]
output_dir = "crust-sqlite-shell/src/generated/"

# Comprehensive compilation flags for full feature support
compile_flags = [
  # Core features from defines_shell.txt
  "-DSQLITE_HAVE_ZLIB=1",
  "-DSQLITE_DQS=0",
  "-DSQLITE_STRICT_SUBTYPE=1",

  # Full-text search
  "-DSQLITE_ENABLE_FTS3",
  "-DSQLITE_ENABLE_FTS4",
  "-DSQLITE_ENABLE_FTS5",

  # JSON support
  "-DSQLITE_ENABLE_JSON1",

  # Virtual tables
  "-DSQLITE_ENABLE_RTREE",
  "-DSQLITE_ENABLE_STMTVTAB",
  "-DSQLITE_ENABLE_DBPAGE_VTAB",
  "-DSQLITE_ENABLE_DBSTAT_VTAB",
  "-DSQLITE_ENABLE_BYTECODE_VTAB",

  # Query analysis & optimization
  "-DSQLITE_ENABLE_EXPLAIN_COMMENTS",
  "-DSQLITE_ENABLE_UNKNOWN_SQL_FUNCTION",
  "-DSQLITE_ENABLE_OFFSET_SQL_FUNC",
  "-DSQLITE_ENABLE_PERCENTILE",

  # Extensions
  "-DSQLITE_SHELL_HAVE_RECOVER=1",
  "-DSQLITE_ENABLE_SESSION",
  "-DSQLITE_ENABLE_MATH_FUNCTIONS",

  # Search paths
  "-I.",
  "-I./sqlite-shell-src",
]

[c2rust.options]
simplify_extern_crates = true
preserve_comments = true
emit_panic_on_fail = true

[workspace]
members = [
    "sqlite-printf-macros",
]
exclude = [
    "crust-sqlite-shell",
    "crust-tclsqlite",
    "pub-interface",
]

[workspace.dependencies]
# Common dependencies shared across workspace
[package]
name = "sqlite_noamalgam"
authors = ["C2Rust"]
version = "0.0.0"
publish = false
edition = "2024"
autobins = false

[lib]
name = "sqlite_noamalgam"
path = "lib.rs"
# cdylib — libsqlite_noamalgam.so (for external C consumers)
# rlib   — statically linked into crust-sqlite-shell and crust-tclsqlite
crate-type = ["cdylib", "rlib"]

[dependencies]
c2rust-bitfields = "0.22.1"
libc = "0.2"
parking_lot = "0.10.2"
snafu = "0.7"
sqlite-printf-macros = { path = "sqlite-printf-macros" }
strum_macros = "0.27"

[build-dependencies]
cc = "1"

[features]
default = []
test = ["default"]
fts3 = []
fts4 = ["fts3"]

[workspace]
members = [
    "sqlite-printf-macros",
]
[package]
name = "sqlite_noamalgam"
authors = ["C2Rust"]
version = "0.0.0"
publish = false
edition = "2024"
autobins = false

[lib]
name = "sqlite_noamalgam"
path = "lib.rs"
crate-type = ["cdylib"]

[dependencies]
c2rust-bitfields = "0.22.1"
libc = "0.2"
parking_lot = "0.10.2"
snafu = "0.7"
sqlite-printf-macros = { path = "sqlite-printf-macros" }
strum_macros = "0.27"

[features]
default = []
test = ["default"]
name: Coding Agent

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: GitHub username (matches self-hosted runner label)
        required: true
        type: string
      issue_number:
        description: Issue number to work on
        required: true
        type: string

jobs:
  fetch-issue:
    runs-on: ubuntu-latest
    outputs:
      title:    ${{ steps.f.outputs.title }}
      body_raw: ${{ steps.f.outputs.body_raw }}
    steps:
      - name: fetch
        id: f
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          REPO:         ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          J=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER")
          echo "title=$(echo "$J" | jq -r .title)" >> "$GITHUB_OUTPUT"
          { echo "body_raw<<EOF_BODY_RAW"; echo "$J" | jq -r '.body // ""'; echo "EOF_BODY_RAW"; } >> "$GITHUB_OUTPUT"

  # Verified by: step_output_checks/parse_issue_output
  parse-issue:
    needs: fetch-issue
    runs-on: ubuntu-latest
    env:
      TITLE:        ${{ needs.fetch-issue.outputs.title }}
      BODY_RAW:     ${{ needs.fetch-issue.outputs.body_raw }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    outputs:
      agent_task_text:      ${{ steps.p.outputs.agent_task_text }}
      pr_branch:            ${{ steps.p.outputs.pr_branch }}
      base_branch:          ${{ steps.p.outputs.base_branch }}
      timeout_secs:         ${{ steps.p.outputs.timeout_secs }}
      model:                ${{ steps.p.outputs.model }}
      agent_branch_default: ${{ steps.p.outputs.agent_branch_default }}
    steps:
      - name: parse
        id: p
        run: |
          TITLE="${TITLE:-}"
          BODY_RAW="${BODY_RAW:-}"
          ISSUE_NUMBER_IN="${ISSUE_NUMBER:-}"

          # Strip CR (GitHub issue bodies are CRLF)
          BODY_RAW=$(printf '%s' "$BODY_RAW" | tr -d '\r')

          BRANCH_SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/-\+/-/g;s/^-//;s/-$//' | cut -c1-100)

          # Only strip frontmatter when at least two `---` fences are present;
          # otherwise sed '0,/---/d' would delete through EOF and wipe the body.
          DELIM_COUNT=$(printf '%s\n' "$BODY_RAW" | grep -c '^---[[:space:]]*$' || true)
          if [ "${DELIM_COUNT:-0}" -ge 2 ]; then
            AGENT_TASK_TEXT=$(printf '%s\n' "$BODY_RAW" | sed '0,/^---[[:space:]]*$/d' | sed '0,/^---[[:space:]]*$/d')
            YAML_PART=$(printf '%s\n' "$BODY_RAW" | sed -n '/^---[[:space:]]*$/,/^---[[:space:]]*$/p' | sed '1d;$d')
          else
            AGENT_TASK_TEXT="$BODY_RAW"
            YAML_PART=""
          fi
          PR_BRANCH=""
          BASE_BRANCH=""
          TIMEOUT_MINS=""
          MODEL=""
          if [ -n "$YAML_PART" ]; then
            PR_BRANCH=$(echo "$YAML_PART" | yq -r '.pr_branch // ""')
            BASE_BRANCH=$(echo "$YAML_PART" | yq -r '.base_branch // ""')
            TIMEOUT_MINS=$(echo "$YAML_PART" | yq -r '.timeout // ""')
            MODEL=$(echo "$YAML_PART" | yq -r '.model // ""')
          fi
          [ "$PR_BRANCH" = "null" ] && PR_BRANCH=""
          [ "$BASE_BRANCH" = "null" ] && BASE_BRANCH=""
          [ "$TIMEOUT_MINS" = "null" ] && TIMEOUT_MINS=""
          [ "$MODEL" = "null" ] && MODEL=""

          TIMEOUT_SECS=$(( ${TIMEOUT_MINS:-10} * 60 ))
          MODEL="${MODEL:-claude-haiku-4-5}"
          AGENT_BRANCH_DEFAULT="agent/${ISSUE_NUMBER_IN}-${BRANCH_SLUG}"

          : "${GITHUB_OUTPUT:?GITHUB_OUTPUT must be set}"
          echo "pr_branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "timeout_secs=$TIMEOUT_SECS" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "agent_branch_default=$AGENT_BRANCH_DEFAULT" >> "$GITHUB_OUTPUT"
          echo "agent_task_text<<EOF_AGENT_TASK_TEXT" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$AGENT_TASK_TEXT" >> "$GITHUB_OUTPUT"
          echo "EOF_AGENT_TASK_TEXT" >> "$GITHUB_OUTPUT"

  validate-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Validate runner availability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_LABEL: ${{ inputs.runner_label }}
        run: |
          echo "::group::Validating Runner"
          echo "Checking for self-hosted runner with label: $RUNNER_LABEL"

          runners=$(gh api repos/${{ github.repository }}/actions/runners \
            --jq '.runners[] | select(.labels[].name == "'$RUNNER_LABEL'") | .id' 2>/dev/null || echo "")

          if [ -z "$runners" ]; then
            echo "::error::No self-hosted runner found with label '$RUNNER_LABEL'"
            echo ""
            echo "Available runners:"
            gh api repos/${{ github.repository }}/actions/runners \
              --jq '.runners[] | "\(.id): \(.name) (labels: \(.labels[].name | join(", ")))"' || true
            exit 1
          fi

          echo "✓ Found runner(s) with label: $RUNNER_LABEL"
          echo "::endgroup::"

  gather-repo-facts:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
      REPO:         ${{ github.repository }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    outputs:
      existing_agent_branch: ${{ steps.g.outputs.existing_agent_branch }}
      default_branch:        ${{ steps.g.outputs.default_branch }}
    steps:
      - name: gather
        id: g
        run: |
          EXISTING=$(gh api "repos/$REPO/branches" --paginate -q ".[].name" \
            | grep -E "^agent/$ISSUE_NUMBER(-|$)" | head -1 || true)
          DEFAULT=$(gh api "repos/$REPO" -q .default_branch)
          echo "existing_agent_branch=$EXISTING" >> "$GITHUB_OUTPUT"
          echo "default_branch=$DEFAULT" >> "$GITHUB_OUTPUT"

  # Verified by: step_output_checks/choose_branch_output
  choose-branch:
    needs: [parse-issue, gather-repo-facts]
    runs-on: ubuntu-latest
    env:
      PR_BRANCH:             ${{ needs.parse-issue.outputs.pr_branch }}
      AGENT_BRANCH_DEFAULT:  ${{ needs.parse-issue.outputs.agent_branch_default }}
      EXISTING_AGENT_BRANCH: ${{ needs.gather-repo-facts.outputs.existing_agent_branch }}
      BASE_FROM_ISSUE:       ${{ needs.parse-issue.outputs.base_branch }}
      DEFAULT_BRANCH:        ${{ needs.gather-repo-facts.outputs.default_branch }}
    outputs:
      branch:      ${{ steps.c.outputs.branch }}
      base_branch: ${{ steps.c.outputs.base_branch }}
    steps:
      - name: choose
        id: c
        run: |
          BRANCH="${PR_BRANCH:-${EXISTING_AGENT_BRANCH:-$AGENT_BRANCH_DEFAULT}}"
          BASE="${BASE_FROM_ISSUE:-$DEFAULT_BRANCH}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE" >> "$GITHUB_OUTPUT"

  run-agent:
    needs: [validate-runner, fetch-issue, parse-issue, choose-branch]
    runs-on: [self-hosted, "${{ inputs.runner_label }}"]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repo into isolated workspace
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Checkout work branch
        env:
          BRANCH:      ${{ needs.choose-branch.outputs.branch }}
          BASE_BRANCH: ${{ needs.choose-branch.outputs.base_branch }}
        run: |
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            echo "::notice::Resuming existing work branch: $BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            echo "::notice::Creating new work branch: $BRANCH (base: $BASE_BRANCH)"
            git checkout -B "$BRANCH" "origin/$BASE_BRANCH"
          fi

      - name: Prepare docker-files directories
        run: |
          # DOCKER_FILES must be set in the self-hosted runner's service env
          # (e.g. actions-runner/.env). It points at the host dir holding
          # persistent Claude credentials/cargo caches mounted into the agent.
          : "${DOCKER_FILES:?DOCKER_FILES not set in runner env — configure it in the runner service env (actions-runner/.env)}"
          mkdir -p "$DOCKER_FILES/.credentials" "$DOCKER_FILES/.cargo" "$DOCKER_FILES/.local"
          [ -s "$DOCKER_FILES/.claude.local.json" ] || printf '{}\n' > "$DOCKER_FILES/.claude.local.json"

      # No ghcr.io login needed: ghcr.io/clockwork-pilot/rslite-ws is a public package.
      # If it's ever made private again, re-add a docker login step with a PAT.

      - name: Get image digest
        id: image-digest
        run: bash ${{ github.workspace }}/.github/scripts/get-image-digest.sh

      - name: Pull pinned agent image
        env:
          AGENT_IMAGE: ${{ steps.image-digest.outputs.image }}
        run: docker pull "$AGENT_IMAGE"

      - name: Run Claude agent in Docker
        id: agent
        env:
          MODEL:        ${{ needs.parse-issue.outputs.model }}
          TIMEOUT_SECS: ${{ needs.parse-issue.outputs.timeout_secs }}
          PROMPT:       ${{ needs.parse-issue.outputs.agent_task_text }}
          AGENT_IMAGE:  ${{ steps.image-digest.outputs.image }}
        run: |
          echo "::group::Claude Agent Output"
          set +e
          bash .github/scripts/run-in-docker-claude.sh
          EXIT_CODE=$?
          echo "::endgroup::"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run constraint checks
        id: constraints
        if: always()
        env:
          AGENT_IMAGE: ${{ steps.image-digest.outputs.image }}
        run: |
          # stdout → issue comment; exit code gates the commit step.
          set +e
          bash .github/scripts/run-in-docker-no-claude.sh \
            'check_spec_constraints.py --dry-run' \
            > /tmp/constraints.md 2>&1
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Record HEAD before commit
        id: head-before
        if: always()
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Agent commit
        id: agent-commit
        if: always() && steps.agent.outputs.exit_code == '0' && steps.constraints.outputs.exit_code == '0'
        env:
          MODEL:       ${{ needs.parse-issue.outputs.model }}
          PROMPT:      commit changes
          AGENT_IMAGE: ${{ steps.image-digest.outputs.image }}
        run: bash .github/scripts/run-in-docker-claude.sh --allow-git-commit || true

      - name: Detect new commit
        id: detect-new-commit
        if: always()
        run: |
          if [ "${{ steps.head-before.outputs.sha }}" != "$(git rev-parse HEAD)" ]; then
            echo "has_new_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch and open PR
        if: steps.detect-new-commit.outputs.has_new_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ needs.choose-branch.outputs.branch }}"
          git push origin "$BRANCH"
          COMMIT_MSG=$(git log -1 --pretty=%B HEAD)
          {
            echo "Refs #${{ inputs.issue_number }}"
            echo
            echo "$COMMIT_MSG"
          } > /tmp/pr-body.md
          gh pr create \
            --title "[AGENT] ${{ needs.fetch-issue.outputs.title }}" \
            --body-file /tmp/pr-body.md \
            --head "$BRANCH" \
            || true   # tolerate 'pr already exists' on re-runs
          gh issue comment "${{ inputs.issue_number }}" --body-file /tmp/constraints.md

      - name: Comment on issue (no PR)
        if: steps.detect-new-commit.outputs.has_new_commit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXIT_CODE="${{ steps.agent.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "0" ]; then
            echo "Agent ran successfully but produced no new commit." > /tmp/msg.md
            echo >> /tmp/msg.md
            cat /tmp/constraints.md >> /tmp/msg.md
            gh issue comment "${{ inputs.issue_number }}" --body-file /tmp/msg.md
          else
            gh issue comment "${{ inputs.issue_number }}" --body-file /tmp/constraints.md
          fi

name: Check Constraints

on:
  push:
  pull_request:

jobs:
  check-constraints:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rslite
        uses: actions/checkout@v4

      - name: Checkout y2-claude-plugin
        uses: actions/checkout@v4
        with:
          repository: Clockwork-Pilot/y2-claude-plugin
          path: ${{ runner.workspace }}/claude-plugin

      - name: Setup Docker mount directories
        run: |
          mkdir -p ${{ runner.workspace }}/.cargo
          mkdir -p ${{ runner.workspace }}/.credentials
          mkdir -p ${{ runner.workspace }}/venv
          echo '{}' > ${{ runner.workspace }}/.claude.local.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Cache Docker image
        id: cache-image
        uses: actions/cache@v4
        with:
          path: /tmp/rslite-ws.tar
          key: docker-rslite-ws-${{ hashFiles('.github/workflows/check-constraints.yml') }}

      - name: Load cached image
        if: steps.cache-image.outputs.cache-hit == 'true'
        run: docker load < /tmp/rslite-ws.tar

      - name: Pull image and save to cache
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/clockwork-pilot/rslite-ws:latest
          docker save ghcr.io/clockwork-pilot/rslite-ws:latest > /tmp/rslite-ws.tar

      - name: Run constraint checks
        id: constraints
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ runner.workspace }}/claude-plugin:/plugin:ro \
            -v ${{ runner.workspace }}/.cargo:/home/node/.cargo \
            -v ${{ runner.workspace }}/.credentials:/home/node/.claude \
            -v ${{ runner.workspace }}/.claude.local.json:/home/node/.claude.json \
            -v ${{ runner.workspace }}/venv:/venv \
            -e WORKSPACE_ROOT=/workspace \
            -e CLAUDE_PROJECT_ROOT=/workspace \
            -e CLAUDE_PLUGIN_ROOT=/plugin \
            -e CLAUDE_FILE_RULES=/docker-scripts/work-on-sqlite/y2-plugin-deny-file-rules.json \
            -e PROXY_WRAPPER_CONFIG=/docker-scripts/work-on-sqlite/proxy_wrapper_config.json \
            -e DISABLE_STOP_HOOK=1 \
            --user root \
            ghcr.io/clockwork-pilot/rslite-ws:latest \
            bash -c '~/create-venv-docker.sh && python /plugin/constraints_tool/constraints_tool/check_spec_constraints.py'

      - name: Show full results on failure
        if: failure() && steps.constraints.outcome == 'failure'
        run: |
          cat ${{ github.workspace }}/spec-checks.k.md
          echo "--- testrunner failures ---"
          grep "errors out of" /sqlite/testrunner.log 2>/dev/null | grep -v " 0 errors" || echo "(no testrunner.log failures found)"

name: Check Constraints

on:
  push:
  pull_request:

jobs:
  check-constraints:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rslite
        uses: actions/checkout@v4

      - name: Checkout y2-claude-plugin
        uses: actions/checkout@v4
        with:
          repository: Clockwork-Pilot/y2-claude-plugin
          path: .claude-plugin

      - name: Setup Docker mount directories
        run: |
          mkdir -p ${{ github.workspace }}/docker-files/.cargo
          mkdir -p ${{ github.workspace }}/docker-files/.credentials
          mkdir -p ${{ github.workspace }}/docker-files/.venv
          echo '{}' > ${{ github.workspace }}/docker-files/.claude.local.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Get image digest
        id: image-digest
        run: |
          digest=$(docker manifest inspect ghcr.io/clockwork-pilot/rslite-ws:latest \
            | python3 -c "import sys,json; m=json.load(sys.stdin); print(m.get('config',{}).get('digest','') or m['manifests'][0]['digest'])")
          echo "digest=$digest" >> $GITHUB_OUTPUT

      - name: Cache Docker image
        id: cache-image
        uses: actions/cache@v4
        with:
          path: /tmp/rslite-ws.tar
          key: docker-rslite-ws-${{ steps.image-digest.outputs.digest }}

      - name: Load cached image
        if: steps.cache-image.outputs.cache-hit == 'true'
        run: docker load < /tmp/rslite-ws.tar

      - name: Pull image and save to cache
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/clockwork-pilot/rslite-ws:latest
          docker save ghcr.io/clockwork-pilot/rslite-ws:latest > /tmp/rslite-ws.tar

      - name: Run constraint checks
        id: constraints
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ github.workspace }}/.claude-plugin:/plugin:ro \
            -v ${{ github.workspace }}/docker-files/.cargo:/home/node/.cargo \
            -v ${{ github.workspace }}/docker-files/.credentials:/home/node/.claude \
            -v ${{ github.workspace }}/docker-files/.claude.local.json:/home/node/.claude.json \
            -v ${{ github.workspace }}/docker-files/.venv:/venv \
            -e WORKSPACE_ROOT=/workspace \
            -e CLAUDE_PROJECT_ROOT=/workspace \
            -e CLAUDE_PLUGIN_ROOT=/plugin \
            -e CLAUDE_FILE_RULES=/docker-scripts/work-on-sqlite/y2-plugin-deny-file-rules.json \
            -e PROXY_WRAPPER_CONFIG=/docker-scripts/work-on-sqlite/proxy_wrapper_config.json \
            -e DISABLE_STOP_HOOK=1 \
            --user root \
            ghcr.io/clockwork-pilot/rslite-ws:latest \
            bash -c "source /docker-scripts/work-on-sqlite/user-entrypoint.sh; \
              ~/create-venv-docker.sh && \
              python /plugin/constraints_tool/constraints_tool/check_spec_constraints.py"

      - name: Show full results on failure
        if: failure() && steps.constraints.outcome == 'failure'
        run: |
          echo "--- Spec checks results ---"
          cat "${{ github.workspace }}/spec-checks.k.md"
          echo "--- testrunner failures ---"
          grep "errors out of" "${{ github.workspace }}/sqlite/testrunner.log" 2>/dev/null | grep -v " 0 errors" || echo "(no testrunner.log failures found)"

name: Check Constraints

# Consumer caller: builds an agent image from Dockerfile.agent via
# ensure-docker-image, then runs the autopilot check-constraints action
# against it. Single workflow — dogfoods the custom-Dockerfile path on
# every push/PR.

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-constraints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - id: image
        uses: Clockwork-Pilot/autopilot/.github/actions/ensure-docker-image@main
        with:
          base_image:       ghcr.io/clockwork-pilot/autopilot-ws:latest
          dockerfile:       Dockerfile.agent
          tag:              autopilot-check
          tag_prefix:       ${{ github.repository }}-check-img
      - uses: Clockwork-Pilot/autopilot/.github/actions/check-constraints@main
        with:
          image:             ${{ steps.image.outputs.image }}
          extra_docker_args: -e VERBOSE=1

name: Check Constraints

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-constraints:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rslite
        uses: actions/checkout@v6
        with:
          path: rslite

      # No ghcr.io login needed: ghcr.io/clockwork-pilot/rslite-ws is a public package.
      # If it's ever made private again, re-add a docker login step with a PAT.

      - name: Get image digest
        id: image-digest
        run: bash ${{ github.workspace }}/rslite/.github/scripts/get-image-digest.sh

      - name: Cache Docker image
        id: cache-image
        uses: actions/cache@v4
        with:
          path: /tmp/rslite-ws.tar
          key: docker-rslite-ws-${{ steps.image-digest.outputs.digest }}

      - name: Load cached image
        if: steps.cache-image.outputs.cache-hit == 'true'
        run: bash ${{ github.workspace }}/rslite/.github/scripts/docker-cache.sh load

      - name: Pull image and save to cache
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: bash ${{ github.workspace }}/rslite/.github/scripts/docker-cache.sh save

      - name: Run constraint checks
        id: constraints
        run: |
          echo "::group::Constraint Checks"
          docker run --rm \
            -v ${{ github.workspace }}/rslite:/workspace \
            ghcr.io/clockwork-pilot/rslite-ws:latest \
            bash -c "source /docker-scripts/user-entrypoint.sh; \
              python /plugin/constraints_tool/constraints_tool/check_spec_constraints.py || { \
              echo '--- Spec checks results ---'; \
              cat /workspace/spec-checks.k.md; \
              echo '--- testrunner failures ---'; \
              grep 'errors out of' /sqlite/testrunner.log 2>/dev/null | grep -v '^0 errors' || echo '(no testrunner.log failures found)'; exit 1; }" || {
            echo "::error::Constraint checks failed"
            exit 1
          }
          echo "::endgroup::"
